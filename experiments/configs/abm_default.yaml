# ============================================================================
# پیکربندی پیش‌فرض ABM تخصیص تاکسی آنلاین تهران
# مطابق فصل ۳ روش‌شناسی (با اصلاحات بر مبنای targets.json)
# ============================================================================

# -------- زمان‌بندی --------
step_minutes: 2.0          # مدت هر گام شبیه‌سازی (دقیقه)
max_steps: 720             # افق شبیه‌سازی: ۷۲۰ گام = ۲۴ ساعت
seed: 42                   # بذر تصادفی مرکزی

# -------- عرضه (راننده‌ها) --------
n_drivers: 800             # تعداد کل راننده‌ها (طبق فصل ۳: «حدود ۸۰۰»)

# -------- ترافیک و فاصله --------
base_speed_kmh: 30.0       # سرعت پایه (فصل ۳ بخش ۳-۵-۲)
d_max_km: 5.0              # شعاع کاندیدی و پارامتر f_dist (فصل ۳ رابطه ۳-۵)

# -------- مختصات (jitter) --------
jitter_origin_deg: 0.005   # ≈ ۵۰۰ متر — پراکندگی مبدأ/مقصد مسافر در ناحیه
jitter_driver_deg: 0.003   # ≈ ۳۰۰ متر — پراکندگی موقعیت اولیه راننده

# -------- پارامترهای کالیبراسیون (مرجع، خوانده می‌شود از targets.json) --------
# توزیع patience مسافر: Gamma(a=0.997, scale=8.087)
# - فصل ۳ نسخه فعلی Exp(1/4) (میانگین ۴ دقیقه) را گفته
# - داده واقعی Gamma(0.997, 8.087) را نشان می‌دهد (میانگین ۸.۰۶، میانه ۵.۵۷)
# - تصمیم: پیروی از داده واقعی → فصل ۳ نیاز به بازنویسی این بخش دارد

# -------- پارامترهای آینده (DQN — مرحله ۷) --------
dqn:
  state_dim: 32
  action_features_dim: 8
  hidden_dims: [256, 256, 128]
  learning_rate: 5.0e-4
  batch_size: 64
  buffer_size: 100000
  warmup_steps: 5000
  target_update_freq: 1000
  gamma: 0.95
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 200000
  n_episodes: 1000
  early_stopping_patience: 50

# -------- ضرایب تابع پاداش (مرحله ۷) --------
reward:
  alpha: 0.6                # وزن WT (فصل ۳ رابطه ۳-۴)
  beta: 0.4                 # وزن DU
  lambda_reject: 0.2        # جریمه رد راننده
  WT_baseline: 2.5154       # از targets.json (دقیقه)
  DU_baseline: 0.6364       # از targets.json
